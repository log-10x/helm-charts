{{- if .Values.apiKeySecret.create }}
{{- if not .Values.log10xApiKey }}
{{- fail "log10xApiKey must be set to a valid API key when apiKeySecret.create is true." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "log10x-retriever.fullname" . }}-api-key
  labels:
    {{- include "log10x-retriever.labels" . | nindent 4 }}
  {{- with .Values.apiKeySecret.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{ .Values.apiKeySecret.secretKey }}: {{ .Values.log10xApiKey | b64enc | quote }}
{{- end }}
{{- /*
    Render the git-token Secret whenever the tenx-git-config init container
    will mount it. A missing gitToken is valid for public repos; rendering
    an empty-token Secret keeps pods from hanging in
    CreateContainerConfigError / FailedMount.
    Mirrors the log10x-streamer.gitEnabled gate used in deployment.yaml.
*/ -}}
{{- if include "log10x-streamer.gitEnabled" . }}
{{- if .Values.apiKeySecret.create }}
---
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "log10x-retriever.fullname" . }}-git-token
  labels:
    {{- include "log10x-retriever.labels" . | nindent 4 }}
type: Opaque
data:
  token: {{ .Values.gitToken | default "" | b64enc | quote }}
{{- end }}
