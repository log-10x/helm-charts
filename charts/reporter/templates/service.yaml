{{- if .Values.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "log10x-reporter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "log10x-reporter.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "log10x-reporter.selectorLabels" . | nindent 4 }}
{{- end }}
