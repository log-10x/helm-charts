            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.workers.resources | nindent 12 }}
          {{- if include "log10x-quarkus.githubEnabled" $ }}
          volumeMounts:
            - name: github-data
              mountPath: /data
          {{- end }}
      {{- if include "log10x-quarkus.githubEnabled" $ }}
      volumes:
        - name: github-data
