# Default values for log10x-quarkus.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Allows overriding base names
#
nameOverride: ""
fullnameOverride: ""

# API key for Log10x authentication
# Used when apiKeySecret.create is true and no existingSecret is specified
# SECURITY WARNING: Do not commit actual API keys to version control
# Provide via: --set log10xApiKey="your-key" or separate values file
#
log10xApiKey: ""

###### Secret Management ######

# Secret containing the TENX_API_KEY
#
apiKeySecret:
  # Set to true to let the chart manage the secret lifecycle
  # The secret will be created/deleted with the Helm release
  # Set to false if using existingSecret or external secret management
  create: true

  # Use an existing secret instead of creating one
  # Useful for:
  # - External secret management tools (External Secrets Operator, Vault, etc.)
  # - Shared secrets across multiple releases
  # - Secrets that should persist beyond the chart lifecycle
  existingSecret: ""

  # The key within the secret that contains the API key
  secretKey: "tenx-api-key"

  # Annotations to add to the secret (useful for external secret management)
  annotations: {}
    # Example for External Secrets Operator:
    # external-secrets.io/managed: "true"

###### Image settings ######

image:
  repository: ghcr.io/log-10x/quarkus-10x
  # pullPolicy: Always recommended for production to prevent version skew
  # Use IfNotPresent for development to speed up deployments
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# When replacing the image to your own custom one, allows for setting
# secrets to allow pull access.
#
imagePullSecrets: []

###### Main deployment (outside world exposed entry points) ######

# Exposes the main deployment to rest calls
#
# If you want to expose the deployment directly (i.e. not via ingress)
# change the type to 'LoadBalancer'
#
service:
  type: ClusterIP
  port: 80
  containerPort: 8080

# Sets the static replica count.
# Value only used if 'autoscaling.enabled' is set to 'false'
#
replicaCount: 1

# Sets the maximum number of parallel pipelines each pod can execute
# Environment variable: TENX_QUARKUS_MAX_ASYNC
#
maxParallelRequests: 10

# Sets the maximum number of queued pipeline requests each pod can hold
# Environment variable: TENX_QUARKUS_MAX_QUEUED
#
maxQueuedRequests: 1000

# Load-based readiness threshold (0-100)
# When (activeTasks + queuedTasks) exceeds this percentage of total capacity,
# the pod will be marked NOT READY and stop receiving new traffic from the Service.
# This enables intelligent load balancing to less-loaded pods.
# Environment variable: TENX_QUARKUS_READINESS_THRESHOLD
# Default: 90 (mark not ready when 90% full)
#
readinessThresholdPercent: 90

# Allows adding additional environment variables to the pods
#
# Specific log10x pipelines might require some static changes to the environment
# variables for optimal performace.
#
# See http://doc.log10x.com/run/apps/cloud/ for more info on cloud applications
#
extraEnv: []

# Health probe configuration for main deployment
#
# Quarkus provides built-in health endpoints:
# - /q/health/live: Liveness check (is the application running?)
# - /q/health/ready: Readiness check (can the application serve traffic?)
# - /q/health/started: Startup check (has the application started?)
#
livenessProbe:
  httpGet:
    path: /q/health/live
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /q/health/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /q/health/started
    port: http
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 30  # 300s (5 min) maximum startup time

# Allows specifying resources for each pod
#
resources: {}

# Controls autoscaling via HorizontalPodAutoscaler
#
# For more info, see https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/
#
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

###### Worker deployment (cluster only exposed entry points) ######

# Sets up a secondary deployment of pods to act as workers for the main deploymet
# Useful when there is a difference in the environment variables or resources
# between the main and worker pods
#
workers:
  enabled: false
  service:
    type: ClusterIP
    port: 80
    containerPort: 8080

  # Sets the static replica count.
  # Value only used if 'workers.autoscaling.enabled' is set to 'false'
  #
  replicaCount: 2

  # Sets the maximum number of parallel pipelines each pod can execute
  # Environment variable: TENX_QUARKUS_MAX_ASYNC
  #
  maxParallelRequests: 10

  #  Sets the maximum number of queued pipeline requests each pod can hold
  # Environment variable: TENX_QUARKUS_MAX_QUEUED
  #
  maxQueuedRequests: 1000

  # Load-based readiness threshold for worker pods (0-100)
  # Same behavior as main deployment readinessThresholdPercent
  # Environment variable: TENX_QUARKUS_READINESS_THRESHOLD
  #
  readinessThresholdPercent: 90

  # Allows adding additional environment variables to the pods
  #
  # Specific log10x pipelines might require some static changes to the environment
  # variables for optimal performace.
  #
  # See http://doc.log10x.com/run/apps/cloud/ for more info on cloud applications
  #
  extraEnv: []

  # Health probe configuration for worker deployment
  # Uses same endpoints as main deployment
  #
  livenessProbe:
    httpGet:
      path: /q/health/live
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /q/health/ready
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  startupProbe:
    httpGet:
      path: /q/health/started
      port: http
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 30

  # Allows specifying resources for each pod
  #
  resources: {}

  # Controls autoscaling via HorizontalPodAutoscaler
  #
  # For more info, see https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/
  #
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 20
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  nodeSelector: {}
  tolerations: []
  affinity: {}

###### Service account ######

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

###### Annotations and security ######

podAnnotations: {}

# Pod-level security context
# Applied to all containers in the pod, controls volume ownership
#
podSecurityContext: {}
  # runAsUser: 1000
  # runAsGroup: 3000
  # fsGroup: 2000
  # runAsNonRoot: true

# Container-level security context
# Controls capabilities, privilege escalation, and root filesystem
#
containerSecurityContext: {}
  # allowPrivilegeEscalation: false
  # readOnlyRootFilesystem: false
  # capabilities:
  #   drop:
  #   - ALL

###### Ingress ######

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
