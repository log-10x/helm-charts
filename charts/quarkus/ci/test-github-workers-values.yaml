# Test values for CI pipeline with GitHub integration and workers
# Tests that both main and worker deployments get init containers

log10xApiKey: "test-api-key-for-ci-testing-only"
githubToken: "ghp_test_token_for_ci_testing_only"

github:
  config:
    repo: "log-10x/test-config-repo"
    branch: "main"

workers:
  enabled: true
  replicaCount: 2

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
