# Test values for CI pipeline with autoscaling and workers
# Tests HPA resource creation and worker deployment configuration
# NOTE: HPA will show metrics errors in test environments without metrics-server,
# but this is expected and validates the HPA templates render correctly

log10xApiKey: "test-api-key-for-ci-testing-only"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

workers:
  enabled: true
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
