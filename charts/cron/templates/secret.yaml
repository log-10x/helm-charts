{{- if .Values.apiKeySecret.create }}
{{- if not .Values.log10xApiKey }}
{{- fail "log10xApiKey must be set to a valid API key when apiKeySecret.create is true." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "log10x-cron.fullname" . }}-api-key
  labels:
    {{- include "log10x-cron.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.apiKeySecret.secretKey }}: {{ .Values.log10xApiKey | b64enc | quote }}
{{- end }}
{{- /*
    Render the git-token Secret whenever ANY job's tenx-git-config init
    container will mount it — i.e. any job with config.git.enabled or
    symbols.git.enabled. The Secret is cluster-wide (one per release)
    while the git-init gate in cronjob.yaml is per-job, so we reduce
    over .Values.jobs here. A missing gitToken is valid for public repos;
    rendering an empty-token Secret keeps pods from hanging in
    CreateContainerConfigError / FailedMount.
*/ -}}
{{- $tenxGitInit := false -}}
{{- range .Values.jobs -}}
  {{- if or (and .config .config.git .config.git.enabled) (and .symbols .symbols.git .symbols.git.enabled) -}}
    {{- $tenxGitInit = true -}}
  {{- end -}}
{{- end -}}
{{- if $tenxGitInit }}
{{- if .Values.apiKeySecret.create }}
---
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "log10x-cron.fullname" . }}-git-token
  labels:
    {{- include "log10x-cron.labels" . | nindent 4 }}
type: Opaque
data:
  token: {{ .Values.gitToken | default "" | b64enc | quote }}
{{- end }}