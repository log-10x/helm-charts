{{- if .Values.apiKeySecret.create }}
{{- if or (not .Values.log10xApiKey) (eq .Values.log10xApiKey "YOUR-API-KEY-HERE") }}
{{- fail "log10xApiKey must be set to a valid API key. The default placeholder 'YOUR-API-KEY-HERE' is not allowed in production." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "log10x-cron.fullname" . }}-api-key
  labels:
    {{- include "log10x-cron.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.apiKeySecret.secretKey }}: {{ .Values.log10xApiKey | b64enc | quote }}
{{- end }}