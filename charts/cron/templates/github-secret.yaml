{{- $needsGithubToken := false }}
{{- range .Values.jobs }}
  {{- if or (and .github .github.config) (and .github .github.symbols) }}
    {{- $needsGithubToken = true }}
  {{- end }}
{{- end }}
{{- if $needsGithubToken }}
{{- if not .Values.githubToken }}
{{- fail "githubToken must be set when jobs use github configuration. At least one job requires GitHub access but githubToken is empty." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "log10x-cron.fullname" . }}-github-token
  labels:
    {{- include "log10x-cron.labels" . | nindent 4 }}
type: Opaque
data:
  token: {{ .Values.githubToken | b64enc | quote }}
{{- end }}
