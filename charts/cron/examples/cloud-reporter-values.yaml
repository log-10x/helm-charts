# Sample config for log10x-cron which sets up a cloud reporter via Git config.
#
# For more info on Log10x Cloud Reporter - https://doc.log10x.com/apps/cloud/reporter/
#
log10xApiKey: "YOUR-LOG10X-API-KEY"

# Git access token for private repositories (config and/or symbols)
# Works with any Git provider (GitHub, GitLab, Bitbucket, self-hosted)
gitToken: "YOUR-GIT-TOKEN"

jobs:
  # A single job will be deployed.
  #
  - name: cloud-reporter

    # Pipeline name which will be reported to identify this job
    #
    runtimeName: my-first-cloud-reporter

    # Will run every 15 minutes, at the 00/15/30/45 minute mark of every hour
    #
    schedule: "*/15 * * * *"
    args:
      # Run the cloud reporter application
      #
      # For more info, see - https://doc.log10x.com/apps/cloud/reporter
      #
      - "@apps/cloud/reporter"

    # Load application configuration from a Git repository.
    # Works with any Git provider (GitHub, GitLab, Bitbucket, self-hosted).
    #
    # NOTE: Don't forget to check that all necessary files in the specified repo/branch
    # are up to date and contain the correct current information.
    # This should include any required parameters, credentials, and settings used
    # by the 10x pipeline as part of your selected app configuration.
    #
    # For more info, see - https://doc.log10x.com/apps/cloud/reporter/deploy
    #
    config:
      git:
        enabled: true
        # Full HTTPS URL of the repository
        url: "https://github.com/YOUR-ACCOUNT/REPO-NAME.git"

        # Optional - branch to clone (defaults to the repository's default branch)
        branch: "my-cloud-reporter-config"

    # Additional env variables, as needed
    #
    # extraEnv:
    #   - name: "MY_ANALYZER_USERNAME"
    #     valueFrom:
    #     secretKeyRef:
    #       name: analyzer-credentials
    #       key: username
    #   - name: "MY_ANALYZER_PASSWORD"
    #     valueFrom:
    #       secretKeyRef:
    #         name: analyzer-credentials
    #         key: password
