# Test values for CI pipeline
# This file provides minimal valid configuration to pass chart validation during testing

log10xApiKey: "test-api-key-for-ci-testing-only"

# Required for scheduled queries to pass validation
queryQueueUrl: "https://sqs.us-east-1.amazonaws.com/123456789/test-query-queue"

clusters:
  - name: test-cluster
    roles: ["index", "query", "stream"]
    replicaCount: 1
    # Set AWS credentials and region for CI testing
    # The application won't actually connect to AWS services in CI, but needs
    # credentials configured to initialize SQS clients without exceptions
    # The QueueConsumer handles connection failures gracefully
    extraEnv:
      - name: AWS_REGION
        value: "us-east-1"
      - name: AWS_ACCESS_KEY_ID
        value: "test-access-key-id"
      - name: AWS_SECRET_ACCESS_KEY
        value: "test-secret-access-key"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
