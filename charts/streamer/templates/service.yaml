apiVersion: v1
kind: Service
metadata:
  name: {{ include "log10x-streamer.fullname" . }}
  labels:
    {{- include "log10x-streamer.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ include "log10x-streamer.name" . }}
