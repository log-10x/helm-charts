{{- if include "log10x-streamer.githubEnabled" . }}
{{- if not .Values.githubToken }}
{{- fail "githubToken must be set when github configuration is specified. At least one of github.config or github.symbols is configured but githubToken is empty." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "log10x-streamer.fullname" . }}-github-token
  labels:
    {{- include "log10x-streamer.labels" . | nindent 4 }}
type: Opaque
data:
  token: {{ .Values.githubToken | b64enc | quote }}
{{- end }}
